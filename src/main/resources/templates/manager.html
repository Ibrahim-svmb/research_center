<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Manager Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 2px solid #eee;
        }

        .tab-btn {
            padding: 1rem 2rem;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            opacity: 0.6;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            opacity: 1;
            border-bottom-color: var(--primary-color);
            color: var(--primary-color);
            font-weight: bold;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Modal for Assignment */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 20px;
            width: 50%;
            border-radius: 10px;
        }

        /* Status Badges */
        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: bold;
            color: white;
            margin-left: 8px;
            vertical-align: middle;
        }

        .status-badge.EN_COURS {
            background-color: #3498db;
        }

        .status-badge.TERMINE {
            background-color: #2ecc71;
        }

        .status-badge.SUSPENDU {
            background-color: #e74c3c;
        }
    </style>
</head>

<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1>Bonjour <span id="headerFirstName">Gestionnaire</span></h1>
            <button class="btn" style="background: #e74c3c;" onclick="location.href='/logout'">Déconnexion</button>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('home')">Tableau de Bord</button>
            <button class="tab-btn" onclick="openTab('projects')">Gestion Projets</button>
        </div>

        <!-- HOME TAB -->
        <div id="home" class="tab-content active">
            <div class="grid-2">
                <div class="glass-card">
                    <h3>Projets par Domaine</h3>
                    <div class="chart-container"><canvas id="domainChart"></canvas></div>
                </div>
                <div class="glass-card">
                    <h3>Statut des Projets</h3>
                    <div class="chart-container"><canvas id="statusChart"></canvas></div>
                </div>
                <div class="glass-card">
                    <h3>Charge Participants</h3>
                    <div class="chart-container"><canvas id="loadChart"></canvas></div>
                </div>
                <div class="glass-card">
                    <h3>Évolution</h3>
                    <div class="chart-container"><canvas id="evolutionChart"></canvas></div>
                </div>
            </div>
        </div>

        <!-- PROJECTS TAB -->
        <div id="projects" class="tab-content">
            <div class="glass-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2>Liste des Projets</h2>
                    <div>
                        <input type="file" id="csvFile" style="display:none" onchange="uploadCsv()">
                        <button class="btn" style="background:#2ecc71;"
                            onclick="document.getElementById('csvFile').click()">Importer CSV</button>
                    </div>
                </div>
                <div id="projectsTable"></div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span onclick="document.getElementById('editModal').style.display='none'"
                style="float:right;cursor:pointer;font-size:1.5rem;">&times;</span>
            <h2>Éditer le Projet</h2>
            <form id="editForm">
                <div class="form-group"><label>Titre</label><input type="text" id="editTitle" required></div>
                <div class="form-group"><label>Description</label><textarea id="editDesc" rows="3"></textarea></div>
                <div class="form-group"><label>Statut</label>
                    <select id="editStatus">
                        <option value="EN_COURS">En Cours</option>
                        <option value="TERMINE">Terminé</option>
                        <option value="SUSPENDU">Suspendu</option>
                    </select>
                </div>
                <div class="form-group"><label>Date Début</label><input type="date" id="editStartDate"></div>
                <div class="form-group"><label>Date Fin</label><input type="date" id="editEndDate"></div>
                <button type="submit" class="btn">Enregistrer</button>
            </form>
        </div>
    </div>

    <!-- Assign Modal -->
    <div id="assignModal" class="modal">
        <div class="modal-content">
            <span onclick="document.getElementById('assignModal').style.display='none'"
                style="float:right;cursor:pointer;font-size:1.5rem;">&times;</span>
            <h2>Affecter un Participant</h2>
            <form id="assignForm">
                <div class="form-group">
                    <label>Sélectionner un Participant</label>
                    <select id="assignParticipantId" required style="width:100%; padding:10px;">
                        <option value="">-- Choisir --</option>
                        <!-- Populated via JS -->
                    </select>
                </div>
                <button type="submit" class="btn">Affecter</button>
            </form>
        </div>
    </div>

    <script>
        // Tab Logic with Hash
        function openTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));

            const content = document.getElementById(tabName);
            const btn = document.querySelector(`.tab-btn[onclick="openTab('${tabName}')"]`);

            if (content) content.classList.add('active');
            if (btn) btn.classList.add('active');

            history.pushState(null, null, '#' + tabName);
        }

        function handleHashChange() {
            const hash = location.hash.replace('#', '');
            if (hash) openTab(hash);
            else openTab('home');
        }
        window.addEventListener('hashchange', handleHashChange);
        document.addEventListener('DOMContentLoaded', handleHashChange);

        let projectsData = [];
        let participantsData = [];
        let currentProjectId = null;

        fetch('/api/dashboard/manager')
            .then(res => {
                if (res.status === 403 || res.status === 401) {
                    window.location.href = '/login'; // Redirect if unauthorized
                    return null;
                }
                return res.json();
            })
            .then(data => {
                if (!data) return;

                // Greeting
                if (data.profile) document.getElementById('headerFirstName').textContent = data.profile.firstName;

                projectsData = data.projects;
                participantsData = data.participants || [];
                const stats = data.statistics;

                // Charts (Simplified for brevity, assumes Chart.js is loaded)
                if (stats) {
                    new Chart(document.getElementById('domainChart'), {
                        type: 'bar', data: { labels: stats.projectsByDomain.map(d => d[0]), datasets: [{ label: 'Projets', data: stats.projectsByDomain.map(d => d[1]), backgroundColor: '#3498db' }] }
                    });
                    new Chart(document.getElementById('statusChart'), {
                        type: 'doughnut', data: { labels: stats.projectsByStatus.map(d => d[0]), datasets: [{ data: stats.projectsByStatus.map(d => d[1]), backgroundColor: ['#2ecc71', '#f1c40f', '#e74c3c'] }] }
                    });
                    new Chart(document.getElementById('loadChart'), {
                        type: 'bar', options: { indexAxis: 'y' },
                        data: { labels: stats.participantLoad.map(d => d[0] + ' ' + d[1]), datasets: [{ label: 'Projets', data: stats.participantLoad.map(d => d[2]), backgroundColor: '#e67e22' }] }
                    });
                    new Chart(document.getElementById('evolutionChart'), {
                        type: 'line', data: { labels: stats.projectsEvolution.map(d => d[0]), datasets: [{ label: 'Evolution', data: stats.projectsEvolution.map(d => d[1]), borderColor: '#9b59b6' }] }
                    });
                }

                // Project Table
                renderProjects();
            })
            .catch(err => console.error("Error loading dashboard", err));

        function renderProjects() {
            document.getElementById('projectsTable').innerHTML = `
                <table style="width:100%; border-collapse: collapse;">
                    <thead><tr style="background:#f8f9fa; text-align:left;"><th style="padding:10px;">Titre</th><th>Dates</th><th>Avancement</th><th>Responsable</th><th>Participants</th><th>Actions</th></tr></thead>
                    <tbody>
                        ${projectsData.map(p => `
                            <tr style="border-bottom:1px solid #eee;">
                                <td style="padding:10px;">
                                    <strong>${p.titre_projet}</strong>
                                    <span class="status-badge ${p.status}">${p.status.replace('_', ' ')}</span><br>
                                    <small style="color:#666;">${p.researchDomain ? p.researchDomain.name : '-'}</small>
                                </td>
                                <td style="font-size:0.9rem;">
                                    Début: ${p.date_debut || '-'}<br>
                                    Fin: ${p.date_fin || '-'}
                                </td>
                                <td style="width: 150px;">
                                    <div style="background:#eee; border-radius:10px; height:10px; width:100%;">
                                        <div style="background:${p.niveau_avancement === 100 ? '#2ecc71' : '#3498db'}; width:${p.niveau_avancement}%; height:100%; border-radius:10px;"></div>
                                    </div>
                                    <div style="text-align:center; font-size:0.8rem; margin-top:2px;">${p.niveau_avancement}%</div>
                                </td>
                                <td>${p.responsable ? p.responsable.lastName : '-'}</td>
                                <td style="text-align:center;">${p.participants ? p.participants.length : 0}</td>
                                <td>
                                    <button class="btn" style="padding:5px 10px; font-size:0.8rem;" onclick="openEdit(${p.project_id})">Éditer</button>
                                    <button class="btn" style="padding:5px 10px; font-size:0.8rem; background:#3498db;" onclick="openAssign(${p.project_id})">Affecter</button>
                                    <button class="btn" style="padding:5px 10px; font-size:0.8rem; background:#e74c3c;" onclick="deleteProj(${p.project_id})">Suppr.</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function uploadCsv() {
            const fileInput = document.getElementById('csvFile');
            const file = fileInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/api/projects/import', {
                    method: 'POST',
                    body: formData
                });
                const result = await res.json();
                if (res.ok) {
                    let msg = `Import terminé.\nSuccès: ${result.successCount}`;
                    if (result.errors && result.errors.length > 0) {
                        msg += `\nErreurs:\n${result.errors.join('\n')}`;
                    }
                    alert(msg);
                    location.reload();
                } else {
                    alert("Erreur lors de l'import");
                }
            } catch (error) {
                console.error("Error uploading CSV", error);
                alert("Erreur réseau");
            }
        }

        // Edit
        function openEdit(id) {
            currentProjectId = id;
            const p = projectsData.find(x => x.project_id === id);
            document.getElementById('editTitle').value = p.titre_projet;
            document.getElementById('editDesc').value = p.description;
            document.getElementById('editStatus').value = p.status;
            document.getElementById('editStartDate').value = p.date_debut;
            document.getElementById('editEndDate').value = p.date_fin;
            document.getElementById('editModal').style.display = 'block';
        }

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                titre_projet: document.getElementById('editTitle').value,
                description: document.getElementById('editDesc').value,
                status: document.getElementById('editStatus').value,
                date_debut: document.getElementById('editStartDate').value,
                date_fin: document.getElementById('editEndDate').value
            };

            if (payload.date_debut && payload.date_fin) {
                if (new Date(payload.date_fin) < new Date(payload.date_debut)) {
                    alert("La date de fin ne peut pas être antérieure à la date de début.");
                    return;
                }
            }
            await fetch('/api/projects/' + currentProjectId, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            location.reload();
        });

        // Assign
        function openAssign(id) {
            currentProjectId = id;
            const project = projectsData.find(p => p.project_id === id);
            if (!project) return;

            const responsibleId = project.responsable ? project.responsable.id : null;
            const existingParticipantIds = project.participants ? project.participants.map(p => p.id) : [];

            // Populate select
            const select = document.getElementById('assignParticipantId');
            select.innerHTML = '<option value="">-- Choisir --</option>';
            participantsData.forEach(p => {
                // Exclude responsible
                if (p.id === responsibleId) return;

                const domainNames = p.researchDomains && p.researchDomains.length > 0
                    ? p.researchDomains.map(d => d.name).join(', ')
                    : 'Aucun';

                const option = document.createElement('option');
                option.value = p.id;

                // Disable if already assigned
                if (existingParticipantIds.includes(p.id)) {
                    option.disabled = true;
                    option.textContent = `${p.firstName} ${p.lastName} (${domainNames}) - Déjà affecté`;
                    option.style.color = '#999';
                } else {
                    option.textContent = `${p.firstName} ${p.lastName} (${domainNames})`;
                }

                select.appendChild(option);
            });

            document.getElementById('assignModal').style.display = 'block';
        }

        document.getElementById('assignForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const partId = document.getElementById('assignParticipantId').value;
            if (!partId) return;

            const res = await fetch(`/api/projects/${currentProjectId}/participants/${partId}`, { method: 'POST' });
            if (res.ok) { alert('Participant affecté'); location.reload(); }
            else alert('Erreur affectation');
        });

        // Delete
        async function deleteProj(id) {
            if (confirm('Supprimer ?')) {
                await fetch('/api/projects/' + id, { method: 'DELETE' });
                location.reload();
            }
        }
    </script>
</body>

</html>
