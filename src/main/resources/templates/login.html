<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Connexion - Research Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
        }

        .tab {
            flex: 1;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            opacity: 0.7;
            transition: 0.3s;
            font-weight: 600;
        }

        .tab.active {
            opacity: 1;
            border-bottom: 3px solid var(--primary-color);
            color: var(--primary-color);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.5s;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body style="display: flex; justify-content: center; align-items: center;">

    <div class="glass-card" style="width: 100%; max-width: 450px;">
        <h2 style="text-align: center; margin-bottom: 2rem;">Connexion</h2>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('client')">Espace Client</div>
            <div class="tab" onclick="switchTab('admin')">Admin / Manager</div>
        </div>

        <!-- Error Message -->
        <div th:if="${param.error}"
            style="text-align: center; color: #e74c3c; margin-bottom: 1rem; padding: 0.5rem; background: rgba(231, 76, 60, 0.1); border-radius: 4px;">
            Identifiants incorrects. Veuillez réessayer.
        </div>

        <!-- Global OAuth2 Button -->
        <div style="text-align: center; margin-bottom: 1.5rem;">
            <a href="/oauth2/authorization/google" class="btn btn-google w-100"
                style="background: #fff; color: #333; width: 100%; box-sizing: border-box; display: flex; align-items: center; justify-content: center; gap: 10px; border: 1px solid #ddd;">
                <i class="bi bi-google"></i>
                Continuer avec Google
            </a>
            <p style="font-size: 0.8rem; color: #666; margin-top: 0.5rem;">Disponible pour tous les utilisateurs</p>
        </div>

        <!-- Client Tab -->
        <div id="client" class="tab-content active">
            <form action="/login" method="post">
                <input type="hidden" name="login_type" value="participant">
                <div class="form-group">
                    <label>Nom d'utilisateur</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Se connecter</button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem;">
                <p>Pas encore de compte ? <a href="/register"
                        style="color: var(--primary-color); font-weight: bold;">Créer un compte</a></p>
            </div>
        </div>

        <!-- Admin Tab -->
        <div id="admin" class="tab-content">
            <p style="text-align: center; font-size: 0.9rem; margin-bottom: 1rem; color: #dc3545;">Accès réservé au
                personnel</p>
            <form action="/login" method="post">
                <input type="hidden" name="login_type" value="staff">
                <div class="form-group">
                    <label>Identifiant</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit" class="btn" style="background-color: #555; width: 100%;">Connexion</button>
            </form>
        </div>
    </div>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }
    </script>

</body>

</html>
